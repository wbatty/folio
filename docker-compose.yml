services:
  postgres:
    image: postgres:16-alpine
    container_name: duckreports-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: duckreports
      POSTGRES_PASSWORD: duckreports
      POSTGRES_DB: duckreports
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
